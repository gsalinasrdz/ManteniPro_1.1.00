name: Keep Supabase alive

on:
  schedule:
    - cron: "0 8 */4 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ManteniPro DB
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mantenipro-fawn.vercel.app/api/ping)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed"
            exit 1
          fi
          echo "Supabase is alive"
